# config.yaml - Production configuration for DR+DME detection system
#
# Centralised hyperparameter management for all pipeline components.
# Edit this file to customise training, evaluation, and data loading.
#
# Usage:
#   python main_pipeline.py --config config.yaml
#   python train_enhanced.py   (reads DEFAULT_ENHANCED_CONFIG, override via CLI)

# ============================================================
# GLOBAL SETTINGS
# ============================================================
seed: 42
long_stage2_mode: true # true=use configured Stage2 (long), false=legacy Stage2 (15 epochs, collapse_guard_patience=5)
input_shape: [512, 512, 3]
num_dme_classes: 3 # 0=No DME, 1=Mild, 2=Moderate
num_dr_classes: 5 # 0=No DR, 1=Mild, 2=Moderate, 3=Severe NPDR, 4=Proliferative
output_dir: pipeline_outputs
checkpoint_dir: pipeline_outputs/checkpoints

# ============================================================
# DATA LOADING
# ============================================================
batch_size: 8
val_split: 0.20
augment_train: true
use_advanced_loader: true # Use QWK-aware stratified loader
dme_class_weight_clip_ratio: 7.0 # stricter cap to avoid mild-class overweight instability
max_batches:
  null # null = process entire validation set for accurate QWK
  # Set to a positive integer to limit batches (useful to
  # avoid OOM on very large datasets)

# Medical domain class weights
medical_importance: true # Severe/Moderate classes weighted higher
ordinal_penalty: true # Boundary classes weighted extra
# NOTE: class weights from loader are applied inside OrdinalWeightedCrossEntropy
# when stageX.ordinal_loss_weighting=true (default below).

# Preprocessing parameters (CLAHE + cropping)
border_fraction: 0.10
clip_limit: 2.0
grid_size: 8

# ============================================================
# STAGE 1: INITIAL TRAINING
# ============================================================
stage1:
  epochs: 40
  learning_rate: 2.0e-5 # slightly lower for smoother joint optimisation
  early_stopping_patience: 15
  lr_reduce_patience: 8
  lr_reduce_factor: 0.5
  min_lr: 1.0e-7
  ordinal_loss_weighting: true
  focal_loss_gamma: 1.5
  dme_label_smoothing: 0.02 # reduced smoothing to preserve class separation for QWK
  dme_soft_ordinal_weights: false # stage1 uses hard ordinal weighting for sharper boundaries
  dr_loss_weight: 0.32
  dr_class_weighting: true
  dr_class_weight_clip_ratio: 7.5

# ============================================================
# STAGE 2: FINE-TUNING
# ============================================================
stage2:
  epochs: 50
  learning_rate: 2.0e-7 # safer fine-tuning when starting from strong stage1 checkpoint
  early_stopping_patience: 20 # allow long stage2 to recover after mid-run dips
  lr_reduce_patience: 6
  lr_reduce_factor: 0.3
  min_lr: 1.0e-9
  ordinal_loss_weighting: true
  focal_loss_gamma: 1.5
  dme_label_smoothing: 0.02
  dme_soft_ordinal_weights: true # keep soft ordinal weighting in stage2 fine-tuning
  dr_loss_weight: 0.12
  dr_class_weighting: true
  dr_class_weight_clip_ratio: 6.0
  stage2_freeze_aspp_bn: true # freeze ASPP BN along with backbone BN to reduce compute/adaptation
  stage2_checkpoint_use_stage1_baseline: true
  collapse_guard_enabled: true
  collapse_guard_ratio: 0.90
  collapse_guard_min_abs_qwk: 0.62
  collapse_guard_patience: 15
  collapse_guard_hard_drop: 0.55 # only abort on severe collapse
  collapse_guard_start_epoch: 10 # activate guard later to ignore long warmup turbulence
  stage2_revert_if_worse: true
  stage2_min_improvement: 0.001

# ============================================================
# MODEL ARCHITECTURE
# ============================================================
model:
  backbone: resnet50
  backbone_weights: imagenet
  backbone_weights_path: null # Path to custom .h5 backbone weights (overrides backbone_weights)
  aspp_filters: 256
  dr_head_units: 256
  dme_head_units: 256
  dropout_rate: 0.4

# ============================================================
# JOINT DME+DR CHECKPOINT SELECTION
# ============================================================
# Best weights are chosen by a strict-to-relaxed DME/DR QWK ladder.
# Default tiers (highest priority first):
#   1) DME>=0.70 and DR>=0.80  (primary project target)
#   2) DME>=0.72 and DR>=0.78
#   3) DME>=0.75 and DR>=0.75
#   4) DME>=0.70 and DR>=0.75
#   5) DME>=0.70 and DR>=0.72
#   6) DME>=0.70 and DR>=0.70
#   7) DME>=0.68 and DR>=0.70
# If none are met, thresholds are relaxed by fallback_step each tier.
joint_selection:
  enabled: true
  thresholds:
    - [0.70, 0.80]
    - [0.72, 0.78]
    - [0.75, 0.75]
    - [0.70, 0.75]
    - [0.70, 0.72]
    - [0.70, 0.70]
    - [0.68, 0.70]
  fallback_step: 0.02
  min_threshold: 0.60
  dme_floor: 0.70

# ============================================================
# EVALUATION
# ============================================================
evaluation:
  qwk_target: 0.80 # Main success criterion
  output_visualisations: true
  save_confusion_matrix: true
  save_per_class_metrics: true
  save_boundary_confusion: true
  calibrate_dme_thresholds: true
  calibrate_dr_thresholds: true
  calibration_min_qwk_gain: 0.001

# ============================================================
# ABLATION STUDY
# ============================================================
ablation:
  epochs_per_model: 5 # Quick experiments for ablation
  n_bootstrap: 500 # Statistical significance resamples
  output_dir: ablation_results

